<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supporto Clienti | Maxoto</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital@0;1&family=Public+Sans:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="container navbar-container">
            <img src="logo.png" alt="Maxoto" class="brand-logo">
            <span class="support-label">Area Assistenza</span>
        </div>
    </header>

    <main class="page-content">
        <div class="container container-narrow">
            <div class="intro-text">
                <h1>Modulo di Contatto</h1>
                <p>Gentile Cliente, la preghiamo di compilare i campi sottostanti. Il nostro team la ricontatterà entro 24 ore lavorative.</p>
            </div>

            <section class="form-box">
                <form action="#">
                    <div class="form-grid">
                        <div class="input-field">
                            <label>Nome e Cognome</label>
                            <input type="text" placeholder="Es. Giuseppe Verdi" required>
                        </div>
                        <div class="input-field">
                            <label>E-mail Aziendale</label>
                            <input type="email" placeholder="nome@societa.it" required>
                        </div>
                    </div>

                    <div class="input-field">
                        <label>Oggetto della Segnalazione</label>
                        <select>
                            <option>Assistenza Tecnica AI</option>
                            <option>Informazioni Commerciali</option>
                            <option>Problemi di Fatturazione</option>
                            <option>Supporto Tecnico Generale</option>
                        </select>
                    </div>

                    <div class="input-field">
                        <label>Messaggio</label>
                        <textarea rows="5" placeholder="Descriva la sua richiesta nei dettagli..."></textarea>
                    </div>

                    <button type="submit" class="submit-button">Invia Richiesta</button>
                </form>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Maxoto. Tutti i diritti riservati.</p>
        </div>
    </footer>

</body>
</html>

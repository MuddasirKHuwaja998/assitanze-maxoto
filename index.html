<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistenza Clienti | Maxoto</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="container">
            <img src="logo.png" alt="Maxoto Logo" class="nav-logo">
        </div>
    </header>

    <section class="hero-section">
        <div class="container">
            <h1>Servizio di Assistenza</h1>
            <p>Benvenuti nel portale di supporto Maxoto. Gestiamo ogni richiesta con precisione e cura.</p>
        </div>
    </section>

    <main class="container">
        <div class="form-wrapper">
            <form action="#">
                <div class="grid-row">
                    <div class="field">
                        <label>Nome Completo</label>
                        <input type="text" placeholder="Es. Alessandro Riva" required>
                    </div>
                    <div class="field">
                        <label>Email Professionale</label>
                        <input type="email" placeholder="nome@azienda.it" required>
                    </div>
                </div>

                <div class="field">
                    <label>Settore di Interesse</label>
                    <select>
                        <option>Supporto Tecnico AI</option>
                        <option>Gestione Abbonamenti</option>
                        <option>Consulenza Strategica</option>
                        <option>Altro</option>
                    </select>
                </div>

                <div class="field">
                    <label>Dettaglio della Richiesta</label>
                    <textarea rows="6" placeholder="Descriva qui le sue necessità..."></textarea>
                </div>

                <button type="submit" class="main-button">Invia il Modulo</button>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Maxoto. Eccellenza e Innovazione Digitale.</p>
        </div>
    </footer>

</body>
</html>
